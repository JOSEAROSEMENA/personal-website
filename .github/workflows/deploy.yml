name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Check deployment configuration
        run: |
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}" || (echo "Missing GitHub Actions variable: AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${S3_BUCKET_NAME}" || (echo "Missing GitHub Actions variable: S3_BUCKET_NAME" && exit 1)
          test -n "${CLOUDFRONT_DISTRIBUTION_ID}" || (echo "Missing GitHub Actions variable: CLOUDFRONT_DISTRIBUTION_ID" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload build to S3
        run: aws s3 sync build/ "s3://${S3_BUCKET_NAME}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
